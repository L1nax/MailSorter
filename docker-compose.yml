version: '3.8'

services:
  mailsort:
    build: .
    image: mailsort:latest
    container_name: mailsort
    restart: unless-stopped
    ports:
      - '8080:8080'
    volumes:
      - ./data:/data
    environment:
      - MAILSORT_DATA_DIR=/data
      # Optional: set a secret key for session encryption
      # - MAILSORT_SECRET_KEY=change-me
