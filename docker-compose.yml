version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: mailsort-backend:latest
    container_name: mailsort-backend
    restart: unless-stopped
    ports:
      - '8080:8080'
    volumes:
      - ./data:/data
    environment:
      - MAILSORT_DATA_DIR=/data
      # - MAILSORT_SECRET_KEY=change-me
    networks:
      - mailsort

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: mailsort-frontend:latest
    container_name: mailsort-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - mailsort

networks:
  mailsort:
    driver: bridge
